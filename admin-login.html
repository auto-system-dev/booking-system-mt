<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台登入</title>
    <link rel="icon" type="image/png" href="/assets/platform/Copilot_20260416_164536.png">
    <link rel="apple-touch-icon" href="/assets/platform/Copilot_20260416_164536.png">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #4ca3e8;
        }
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            inset: 0;
            min-height: 100vh;
            min-height: 100dvh;
            background-image: url('Background%20image.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #4ca3e8;
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-box {
            background: #fff;
            border-radius: 24px;
            padding: 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }
        .login-box-header {
            background: #262A33;
            color: #fff;
            padding: 40px 30px;
            text-align: center;
        }
        .login-box-header h2 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 8px;
        }
        .login-box-header .subtitle {
            margin: 0;
            font-size: 16px;
            opacity: 0.9;
            font-weight: 300;
        }
        .login-box form {
            padding: 40px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        .form-group input:focus {
            border-color: #2C8EC4;
            box-shadow: 0 0 0 3px rgba(44, 142, 196, 0.1);
        }
        .btn-primary {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: #262A33;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: #1a1d24;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(38, 42, 51, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.75;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .error-message {
            display: none;
            color: #e74c3c;
            background: #fee;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
            white-space: pre-line;
        }
        .info-message {
            display: none;
            color: #166534;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
            white-space: pre-line;
        }
        .subtle-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: -8px;
            margin-bottom: 6px;
        }
        .text-link-btn {
            border: none;
            background: transparent;
            color: #2563eb;
            cursor: pointer;
            font-size: 14px;
            padding: 0;
            text-decoration: underline;
        }
        .forgot-password-panel {
            display: none;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #e5e7eb;
        }
        .forgot-password-panel h3 {
            margin: 0 0 10px;
            font-size: 18px;
            color: #1f2937;
        }
        .forgot-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-outline {
            flex: 1;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #1e293b;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-box">
                <div class="login-box-header">
                    <h2>管理後台登入</h2>
                    <p class="subtitle">登入以管理訂房系統</p>
                </div>
                <form id="loginForm" data-awaiting-totp="">
                    <div class="form-group">
                        <label for="username">帳號</label>
                        <input id="username" name="username" type="text" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">密碼</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required>
                    </div>
                    <div id="loginTotpGroup" class="form-group" style="display: none;">
                        <label for="totpCode">驗證碼（二階段驗證）</label>
                        <input id="totpCode" name="totp" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="6 位數驗證碼">
                        <small style="display: block; margin-top: 6px; color: #64748b; font-size: 13px;">請開啟驗證應用程式，輸入目前顯示的 6 位數</small>
                    </div>
                    <div class="subtle-actions">
                        <button id="forgotPasswordLink" class="text-link-btn" type="button">忘記密碼？</button>
                    </div>
                    <div id="errorMessage" class="error-message"></div>
                    <div id="infoMessage" class="info-message"></div>
                    <button id="loginButton" class="btn-primary" type="submit">登入</button>

                    <div id="forgotPasswordPanel" class="forgot-password-panel">
                        <h3>忘記密碼</h3>
                        <div class="form-group">
                            <label for="resetEmail">註冊 Email</label>
                            <input id="resetEmail" name="resetEmail" type="email" autocomplete="email" placeholder="請輸入已註冊 Email">
                        </div>
                        <div class="forgot-actions">
                            <button id="forgotCancelBtn" class="btn-outline" type="button">取消</button>
                            <button id="forgotSubmitBtn" class="btn-primary" type="button" style="margin-top:0;flex:1;">寄送重設連結</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        (function () {
            const form = document.getElementById('loginForm');
            const btn = document.getElementById('loginButton');
            const err = document.getElementById('errorMessage');
            const info = document.getElementById('infoMessage');
            const forgotLink = document.getElementById('forgotPasswordLink');
            const forgotPanel = document.getElementById('forgotPasswordPanel');
            const forgotCancelBtn = document.getElementById('forgotCancelBtn');
            const forgotSubmitBtn = document.getElementById('forgotSubmitBtn');
            const resetEmailInput = document.getElementById('resetEmail');
            let pending = false;
            let forgotPending = false;

            function showError(message) {
                if (!message) {
                    err.style.display = 'none';
                    err.textContent = '';
                    return;
                }
                info.style.display = 'none';
                info.textContent = '';
                err.style.display = 'block';
                err.textContent = message;
            }

            function showInfo(message) {
                if (!message) {
                    info.style.display = 'none';
                    info.textContent = '';
                    return;
                }
                err.style.display = 'none';
                err.textContent = '';
                info.style.display = 'block';
                info.textContent = message;
            }

            function toggleForgotPanel(show) {
                forgotPanel.style.display = show ? 'block' : 'none';
                forgotLink.style.display = show ? 'none' : 'inline';
                if (show) {
                    resetEmailInput.value = String(document.getElementById('username').value || '').trim();
                    resetEmailInput.focus();
                }
            }

            async function waitForAuthReady(maxAttempts = 4, delayMs = 250) {
                for (let i = 0; i < maxAttempts; i += 1) {
                    try {
                        const resp = await fetch('/api/admin/check-auth', {
                            method: 'GET',
                            credentials: 'include'
                        });
                        const data = await resp.json().catch(() => ({}));
                        if (resp.ok && data && data.success && data.authenticated) {
                            return true;
                        }
                    } catch (_e) {
                        // ignore and retry
                    }
                    if (i < maxAttempts - 1) {
                        await new Promise((resolve) => setTimeout(resolve, delayMs));
                    }
                }
                return false;
            }

            form.addEventListener('submit', async function (event) {
                event.preventDefault();
                if (pending) return;

                const awaitingTotp = form.dataset.awaitingTotp === '1';
                const username = String(document.getElementById('username').value || '').trim();
                const password = String(document.getElementById('password').value || '');
                const totpCode = String(document.getElementById('totpCode')?.value || '').replace(/\s/g, '');

                if (!awaitingTotp) {
                    if (!username || !password) {
                        showError('請輸入帳號和密碼');
                        return;
                    }
                } else if (!/^\d{6}$/.test(totpCode)) {
                    showError('請輸入驗證應用程式顯示的 6 位數驗證碼');
                    return;
                }

                pending = true;
                btn.disabled = true;
                btn.textContent = awaitingTotp ? '驗證中...' : '登入中...';
                showError('');

                try {
                    let response;
                    if (awaitingTotp) {
                        response = await fetch('/api/admin/login/2fa', {
                            method: 'POST',
                            credentials: 'include',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ code: totpCode })
                        });
                    } else {
                        response = await fetch('/api/admin/login', {
                            method: 'POST',
                            credentials: 'include',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password })
                        });
                    }
                    const result = await response.json().catch(() => ({}));
                    if (!response.ok || !result.success) {
                        throw new Error(result.message || ('HTTP ' + response.status));
                    }
                    if (result.requires2fa) {
                        const totpGroup = document.getElementById('loginTotpGroup');
                        if (totpGroup) totpGroup.style.display = 'block';
                        form.dataset.awaitingTotp = '1';
                        document.getElementById('username').disabled = true;
                        document.getElementById('password').disabled = true;
                        document.getElementById('totpCode')?.focus();
                        return;
                    }
                    form.dataset.awaitingTotp = '';
                    await waitForAuthReady();
                    window.location.replace('/admin?fromLogin=1');
                } catch (error) {
                    showError('登入失敗：' + (error && error.message ? error.message : '請稍後再試'));
                } finally {
                    pending = false;
                    btn.disabled = false;
                    if (form.dataset.awaitingTotp === '1') {
                        btn.textContent = '驗證並登入';
                    } else {
                        btn.textContent = '登入';
                    }
                }
            });

            forgotLink.addEventListener('click', function () {
                showError('');
                showInfo('');
                toggleForgotPanel(true);
            });

            forgotCancelBtn.addEventListener('click', function () {
                if (forgotPending) return;
                showInfo('');
                showError('');
                toggleForgotPanel(false);
            });

            forgotSubmitBtn.addEventListener('click', async function () {
                if (forgotPending) return;
                const email = String(resetEmailInput.value || '').trim().toLowerCase();
                if (!email) {
                    showError('請輸入註冊 Email');
                    return;
                }

                forgotPending = true;
                forgotSubmitBtn.disabled = true;
                forgotSubmitBtn.textContent = '寄送中...';
                showError('');
                showInfo('');

                try {
                    const response = await fetch('/api/admin/password-reset/request', {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const result = await response.json().catch(() => ({}));
                    if (!response.ok || !result.success) {
                        throw new Error(result.message || ('HTTP ' + response.status));
                    }
                    showInfo(result.message || '我們已寄出重設連結');
                    toggleForgotPanel(false);
                } catch (error) {
                    showError(error && error.message ? error.message : '寄送失敗，請稍後再試');
                } finally {
                    forgotPending = false;
                    forgotSubmitBtn.disabled = false;
                    forgotSubmitBtn.textContent = '寄送重設連結';
                }
            });
        })();
    </script>
</body>
</html>
