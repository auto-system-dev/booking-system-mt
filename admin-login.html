<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台登入</title>
    <style>
        :root {
            color-scheme: light;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: linear-gradient(135deg, #2aa4ff, #1d8df2);
            padding: 20px;
        }
        .login-box {
            width: 100%;
            max-width: 360px;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
        }
        .login-header {
            background: #111827;
            color: #fff;
            text-align: center;
            padding: 28px 20px 24px;
        }
        .login-header h1 {
            margin: 0;
            font-size: 34px;
            letter-spacing: 2px;
        }
        .login-header p {
            margin: 8px 0 0;
            color: #d1d5db;
            font-size: 14px;
        }
        .login-body {
            padding: 22px 22px 24px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #111827;
            font-weight: 700;
            font-size: 15px;
        }
        input {
            width: 100%;
            height: 44px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 0 12px;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
        }
        button {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 10px;
            background: #111827;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .error {
            display: none;
            margin: 10px 0 0;
            color: #b91c1c;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 14px;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-header">
            <h1>管理後台登入</h1>
            <p>登入以管理訂房系統</p>
        </div>
        <form id="loginForm" class="login-body">
            <div class="form-group">
                <label for="username">帳號</label>
                <input id="username" name="username" type="text" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">密碼</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <div id="errorMessage" class="error"></div>
            <button id="loginButton" type="submit">登入</button>
        </form>
    </div>
    <script>
        (function () {
            const form = document.getElementById('loginForm');
            const btn = document.getElementById('loginButton');
            const err = document.getElementById('errorMessage');
            let pending = false;

            function showError(message) {
                if (!message) {
                    err.style.display = 'none';
                    err.textContent = '';
                    return;
                }
                err.style.display = 'block';
                err.textContent = message;
            }

            form.addEventListener('submit', async function (event) {
                event.preventDefault();
                if (pending) return;

                const username = String(document.getElementById('username').value || '').trim();
                const password = String(document.getElementById('password').value || '');
                if (!username || !password) {
                    showError('請輸入帳號和密碼');
                    return;
                }

                pending = true;
                btn.disabled = true;
                btn.textContent = '登入中...';
                showError('');

                try {
                    const response = await fetch('/api/admin/login', {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const result = await response.json().catch(() => ({}));
                    if (!response.ok || !result.success) {
                        throw new Error(result.message || ('HTTP ' + response.status));
                    }
                    window.location.replace('/admin');
                } catch (error) {
                    showError('登入失敗：' + (error && error.message ? error.message : '請稍後再試'));
                } finally {
                    pending = false;
                    btn.disabled = false;
                    btn.textContent = '登入';
                }
            });
        })();
    </script>
</body>
</html>
