<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台登入</title>
    <link rel="icon" type="image/png" href="/assets/platform/Copilot_20260416_164536.png">
    <link rel="apple-touch-icon" href="/assets/platform/Copilot_20260416_164536.png">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #4ca3e8;
        }
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            inset: 0;
            min-height: 100vh;
            min-height: 100dvh;
            background-image: url('Background%20image.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #4ca3e8;
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-box {
            background: #fff;
            border-radius: 24px;
            padding: 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }
        .login-box-header {
            background: #262A33;
            color: #fff;
            padding: 40px 30px;
            text-align: center;
        }
        .login-box-header h2 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 8px;
        }
        .login-box-header .subtitle {
            margin: 0;
            font-size: 16px;
            opacity: 0.9;
            font-weight: 300;
        }
        .login-box form {
            padding: 40px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        .form-group input:focus {
            border-color: #2C8EC4;
            box-shadow: 0 0 0 3px rgba(44, 142, 196, 0.1);
        }
        .btn-primary {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: #262A33;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: #1a1d24;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(38, 42, 51, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.75;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .error-message {
            display: none;
            color: #e74c3c;
            background: #fee;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-box">
                <div class="login-box-header">
                    <h2>管理後台登入</h2>
                    <p class="subtitle">登入以管理訂房系統</p>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">帳號</label>
                        <input id="username" name="username" type="text" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">密碼</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required>
                    </div>
                    <div id="errorMessage" class="error-message"></div>
                    <button id="loginButton" class="btn-primary" type="submit">登入</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        (function () {
            const form = document.getElementById('loginForm');
            const btn = document.getElementById('loginButton');
            const err = document.getElementById('errorMessage');
            let pending = false;

            function showError(message) {
                if (!message) {
                    err.style.display = 'none';
                    err.textContent = '';
                    return;
                }
                err.style.display = 'block';
                err.textContent = message;
            }

            async function waitForAuthReady(maxAttempts = 4, delayMs = 250) {
                for (let i = 0; i < maxAttempts; i += 1) {
                    try {
                        const resp = await fetch('/api/admin/check-auth', {
                            method: 'GET',
                            credentials: 'include'
                        });
                        const data = await resp.json().catch(() => ({}));
                        if (resp.ok && data && data.success && data.authenticated) {
                            return true;
                        }
                    } catch (_e) {
                        // ignore and retry
                    }
                    if (i < maxAttempts - 1) {
                        await new Promise((resolve) => setTimeout(resolve, delayMs));
                    }
                }
                return false;
            }

            form.addEventListener('submit', async function (event) {
                event.preventDefault();
                if (pending) return;

                const username = String(document.getElementById('username').value || '').trim();
                const password = String(document.getElementById('password').value || '');
                if (!username || !password) {
                    showError('請輸入帳號和密碼');
                    return;
                }

                pending = true;
                btn.disabled = true;
                btn.textContent = '登入中...';
                showError('');

                try {
                    const response = await fetch('/api/admin/login', {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const result = await response.json().catch(() => ({}));
                    if (!response.ok || !result.success) {
                        throw new Error(result.message || ('HTTP ' + response.status));
                    }
                    await waitForAuthReady();
                    window.location.replace('/admin?fromLogin=1');
                } catch (error) {
                    showError('登入失敗：' + (error && error.message ? error.message : '請稍後再試'));
                } finally {
                    pending = false;
                    btn.disabled = false;
                    btn.textContent = '登入';
                }
            });
        })();
    </script>
</body>
</html>
