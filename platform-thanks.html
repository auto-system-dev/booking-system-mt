<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申請已送出 | Haoding Booking System</title>
    <meta name="robots" content="noindex,nofollow">
    <meta name="ga4-measurement-id" content="">
    <link rel="icon" href="/assets/platform/Copilot_20260416_164536.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/platform/Copilot_20260416_164536.png">
    <link rel="stylesheet" href="/platform-sales.css">
</head>
<body>
    <main class="section">
        <div class="container">
            <div class="card" style="max-width:720px;margin:40px auto;">
                <p class="eyebrow">申請完成</p>
                <h1 style="font-size:36px;">我們已收到你的試用申請</h1>
                <p class="lead">驗證信已寄出，請到信箱完成啟用。完成後即可登入後台，開始設定房型或包棟方案與訂房流程。</p>
                <p id="thanksMeta" style="color:#475569;"></p>
                <div class="hero-cta">
                    <a class="btn btn-primary" href="/admin">前往管理後台</a>
                    <a class="btn btn-outline" href="/platform">回到訂房系統介紹</a>
                </div>
            </div>
        </div>
    </main>
    <script>
    (async function () {
        function getGa4Id() {
            const meta = document.querySelector('meta[name="ga4-measurement-id"]');
            return String(meta?.content || '').trim();
        }
        function initGa4() {
            const id = getGa4Id();
            if (!id || !/^G-[A-Z0-9]+$/i.test(id)) return '';
            window.dataLayer = window.dataLayer || [];
            window.gtag = window.gtag || function () { window.dataLayer.push(arguments); };
            const script = document.createElement('script');
            script.async = true;
            script.src = 'https://www.googletagmanager.com/gtag/js?id=' + encodeURIComponent(id);
            document.head.appendChild(script);
            window.gtag('js', new Date());
            window.gtag('config', id, { anonymize_ip: true });
            return id;
        }
        function track(eventName, params) {
            const payload = params || {};
            if (typeof window.gtag === 'function') window.gtag('event', eventName, payload);
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({ event: eventName, ...payload });
        }
        function setMetaText(planName, variant) {
            const meta = document.getElementById('thanksMeta');
            if (!meta) return;
            meta.textContent = '已送出方案：' + planName + (variant ? ('（文案版本 ' + variant + '）') : '');
        }
        async function resolvePlanNameFromManagedPlans(planCode) {
            const normalizedCode = String(planCode || '').trim().toLowerCase();
            if (!normalizedCode) return '';
            try {
                const response = await fetch('/api/public/subscription-plans', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' },
                    cache: 'no-store'
                });
                if (!response.ok) return '';
                const payload = await response.json();
                const plans = Array.isArray(payload?.plans) ? payload.plans : [];
                const matched = plans.find((item) => String(item?.code || '').trim().toLowerCase() === normalizedCode);
                return String(matched?.name || '').trim();
            } catch (_err) {
                return '';
            }
        }

        const ga4Id = initGa4();
        const qs = new URLSearchParams(window.location.search);
        const plan = String(qs.get('plan') || 'basic_monthly').trim();
        const variant = String(qs.get('variant') || '').trim().toUpperCase();
        const planLabelMap = {
            basic_monthly: 'Basic 月付方案',
            basic_yearly: 'Basic 年付方案',
            pro_monthly: 'Pro 月付方案',
            pro_yearly: 'Pro 年付方案'
        };
        const normalizedPlan = String(plan || '').trim().toLowerCase();
        const managedPlanName = await resolvePlanNameFromManagedPlans(normalizedPlan);
        const localizedPlanName = managedPlanName || planLabelMap[normalizedPlan] || '基本方案（請以後台顯示為準）';
        setMetaText(localizedPlanName, variant);
        track('conversion', {
            page_type: 'platform_thanks',
            source: 'platform_cta_form',
            plan_code: plan,
            hero_variant: variant || 'unknown',
            ga4_id_configured: ga4Id ? 'yes' : 'no'
        });
    })();
    </script>
</body>
</html>
