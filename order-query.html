<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單查詢</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
            background-image: url('Background%20image.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .query-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .query-container {
            width: 100%;
            max-width: 460px;
        }

        .query-box {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .query-header {
            background: #262A33;
            color: #fff;
            text-align: center;
            padding: 36px 28px;
        }

        .query-header h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
        }

        .query-body {
            padding: 32px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2C8EC4;
            box-shadow: 0 0 0 3px rgba(44, 142, 196, 0.1);
        }

        .btn-primary {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: #262A33;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #1a1d24;
        }

        .message {
            margin-top: 12px;
            font-size: 14px;
            min-height: 20px;
        }

        .message.error {
            color: #e74c3c;
        }

        .message.success {
            color: #16a34a;
        }

        .result {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 16px;
        }

        .result-meta {
            margin: 0 0 12px;
            color: #6b7280;
            font-size: 14px;
        }

        .booking-list {
            display: grid;
            gap: 10px;
        }

        .booking-item {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px;
            background: #fcfdff;
            font-size: 14px;
            line-height: 1.6;
        }

        .booking-id {
            color: #1d4ed8;
            font-weight: 700;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="query-page">
        <div class="query-container">
            <div class="query-box">
                <div class="query-header">
                    <h1>訂單查詢</h1>
                </div>
                <div class="query-body">
                    <div class="form-group">
                        <label for="emailInput">Email</label>
                        <input id="emailInput" type="email" placeholder="請輸入訂房時的 Email">
                    </div>

                    <button id="queryBtn" class="btn-primary" type="button">查詢訂單</button>
                    <div id="queryMessage" class="message"></div>

                    <div class="result">
                        <p id="resultMeta" class="result-meta">尚未查詢</p>
                        <div id="bookingList" class="booking-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const emailInput = document.getElementById('emailInput');
        const queryBtn = document.getElementById('queryBtn');
        const queryMessage = document.getElementById('queryMessage');
        const resultMeta = document.getElementById('resultMeta');
        const bookingList = document.getElementById('bookingList');

        function setMessage(text, isError = false) {
            queryMessage.textContent = text || '';
            queryMessage.className = `message ${text ? (isError ? 'error' : 'success') : ''}`;
        }

        function formatAmount(value) {
            const num = Number(value || 0);
            return Number.isFinite(num) ? num.toLocaleString() : '0';
        }

        function statusText(status, paymentStatus) {
            const bookingMap = {
                active: '有效',
                reserved: '保留',
                cancelled: '已取消'
            };
            const payMap = {
                pending: '待付款',
                paid: '已付款',
                refunded: '已退款'
            };
            return `${bookingMap[status] || status || '-'} / ${payMap[paymentStatus] || paymentStatus || '-'}`;
        }

        function renderBookings(bookings) {
            bookingList.innerHTML = '';
            if (!Array.isArray(bookings) || bookings.length === 0) {
                resultMeta.textContent = '查無訂單';
                return;
            }

            resultMeta.textContent = `共找到 ${bookings.length} 筆訂單`;
            bookingList.innerHTML = bookings.map((item) => `
                <div class="booking-item">
                    <div class="booking-id">訂單編號：${item.booking_id || '-'}</div>
                    <div>姓名：${item.guest_name || '-'}</div>
                    <div>電話：${item.guest_phone || '-'}</div>
                    <div>房型：${item.room_type || '-'}</div>
                    <div>入住：${item.check_in_date || '-'}</div>
                    <div>退房：${item.check_out_date || '-'}</div>
                    <div>金額：NT$ ${formatAmount(item.final_amount || item.total_amount)}</div>
                    <div>狀態：${statusText(item.status, item.payment_status)}</div>
                </div>
            `).join('');
        }

        async function queryByEmail() {
            const email = (emailInput.value || '').trim().toLowerCase();
            if (!email) {
                setMessage('請輸入 Email', true);
                return;
            }

            setMessage('查詢中...');
            queryBtn.disabled = true;

            try {
                const response = await fetch(`/api/bookings/email/${encodeURIComponent(email)}`);
                const result = await response.json();

                if (!response.ok || !result.success) {
                    throw new Error(result.message || '查詢失敗');
                }

                setMessage('查詢成功');
                renderBookings(result.data || []);
            } catch (error) {
                setMessage(error.message || '查詢失敗', true);
                resultMeta.textContent = '查詢失敗';
                bookingList.innerHTML = '';
            } finally {
                queryBtn.disabled = false;
            }
        }

        queryBtn.addEventListener('click', queryByEmail);
        emailInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                queryByEmail();
            }
        });
    </script>
</body>
</html>
