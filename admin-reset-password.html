<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設管理後台密碼</title>
    <link rel="icon" type="image/png" href="/assets/platform/Copilot_20260416_164536.png">
    <link rel="apple-touch-icon" href="/assets/platform/Copilot_20260416_164536.png">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #4ca3e8;
        }
        .page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 20px;
            background-image: url('Background%20image.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #4ca3e8;
        }
        .card {
            width: 100%;
            max-width: 430px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: #262A33;
            color: #ffffff;
            text-align: center;
            padding: 32px 24px;
        }
        .header h1 {
            margin: 0 0 6px;
            font-size: 30px;
            font-weight: 700;
        }
        .header p {
            margin: 0;
            font-size: 15px;
            opacity: 0.9;
        }
        form {
            padding: 28px;
        }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1f2937;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        .hint {
            margin-top: 6px;
            color: #64748b;
            font-size: 13px;
        }
        .btn-primary {
            width: 100%;
            margin-top: 8px;
            padding: 13px;
            border: none;
            border-radius: 8px;
            background: #262A33;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-primary:disabled {
            opacity: 0.78;
            cursor: not-allowed;
        }
        .message {
            display: none;
            margin-top: 10px;
            padding: 11px;
            border-radius: 8px;
            font-size: 14px;
            white-space: pre-line;
        }
        .message.error {
            display: block;
            color: #991b1b;
            background: #fef2f2;
            border: 1px solid #fecaca;
        }
        .message.success {
            display: block;
            color: #166534;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
        }
        .back-link {
            display: inline-block;
            margin-top: 12px;
            color: #2563eb;
            text-decoration: underline;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="header">
                <h1>重設密碼</h1>
                <p>請設定新的管理後台登入密碼</p>
            </div>
            <form id="resetForm">
                <div class="form-group">
                    <label for="newPassword">新密碼</label>
                    <input id="newPassword" type="password" autocomplete="new-password" required>
                    <div class="hint">至少 8 碼，需包含大小寫英文字母與數字</div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">確認新密碼</label>
                    <input id="confirmPassword" type="password" autocomplete="new-password" required>
                </div>
                <div id="msg" class="message"></div>
                <button id="submitBtn" class="btn-primary" type="submit">重設密碼</button>
                <a class="back-link" href="/admin/login">返回登入頁</a>
            </form>
        </div>
    </div>
    <script>
        (function () {
            const form = document.getElementById('resetForm');
            const submitBtn = document.getElementById('submitBtn');
            const msg = document.getElementById('msg');
            const newPasswordEl = document.getElementById('newPassword');
            const confirmPasswordEl = document.getElementById('confirmPassword');
            const token = new URLSearchParams(window.location.search).get('token') || '';
            let pending = false;

            function showMessage(text, type) {
                msg.className = 'message ' + (type === 'success' ? 'success' : 'error');
                msg.textContent = text || '';
                msg.style.display = text ? 'block' : 'none';
            }

            function validatePassword(value) {
                if (value.length < 8) return '密碼至少需要 8 個字元';
                if (!/[A-Z]/.test(value)) return '密碼需包含至少 1 個大寫英文字母';
                if (!/[a-z]/.test(value)) return '密碼需包含至少 1 個小寫英文字母';
                if (!/[0-9]/.test(value)) return '密碼需包含至少 1 個數字';
                return '';
            }

            if (!token) {
                showMessage('缺少重設 token，請重新點擊信件中的連結', 'error');
                submitBtn.disabled = true;
                return;
            }

            form.addEventListener('submit', async function (event) {
                event.preventDefault();
                if (pending) return;

                const newPassword = String(newPasswordEl.value || '');
                const confirmPassword = String(confirmPasswordEl.value || '');
                const passwordError = validatePassword(newPassword);
                if (passwordError) {
                    showMessage(passwordError, 'error');
                    return;
                }
                if (newPassword !== confirmPassword) {
                    showMessage('兩次輸入的密碼不一致', 'error');
                    return;
                }

                pending = true;
                submitBtn.disabled = true;
                submitBtn.textContent = '處理中...';
                showMessage('', 'error');

                try {
                    const response = await fetch('/api/admin/password-reset/confirm', {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, newPassword })
                    });
                    const result = await response.json().catch(() => ({}));
                    if (!response.ok || !result.success) {
                        throw new Error(result.message || ('HTTP ' + response.status));
                    }
                    showMessage('密碼重設成功，將返回登入頁...', 'success');
                    window.setTimeout(function () {
                        window.location.replace('/admin/login');
                    }, 1200);
                } catch (error) {
                    showMessage(error && error.message ? error.message : '重設密碼失敗，請稍後再試', 'error');
                } finally {
                    pending = false;
                    submitBtn.disabled = false;
                    submitBtn.textContent = '重設密碼';
                }
            });
        })();
    </script>
</body>
</html>
